r mes projets"},"hero.letsTalk":{en:"Let's Talk",fr:"Discutons"},"hero.scroll":{en:"Scroll",fr:"Défiler"},"hero.tagline":{en:"I build modern web and mobile products that connect clean code, user experience, and real business needs.",fr:"Je crée des produits web et mobile modernes qui allient code propre, expérience utilisateur et besoins métier réels."},"hero.type.1":{en:"Web Developer",fr:"Développeur Web"},"hero.type.2":{en:"Mobile Developer",fr:"Développeur Mobile"},"hero.type.3":{en:"UI/UX Thinker",fr:"Penseur UI/UX"},"hero.type.4":{en:"Product Builder",fr:"Créateur de Produits"},"hero.downloadCV":{en:"Download CV",fr:"Télécharger CV"},"about.label":{en:"01. About",fr:"01. À propos"},"about.title":{en:"Who I Am",fr:"Qui je suis"},"about.bio.1":{en:"I am a developer in professional transition with hands-on experience across web, mobile, data, and CMS projects. My background combines product thinking, technical development, UX awareness, and a strong understanding of user needs.",fr:"Je suis un développeur en transition professionnelle avec une expérience concrète dans le web, le mobile, la data et le CMS. Mon parcours combine pensée produit, développement technique, sensibilité UX et une forte compréhension des besoins utilisateurs."},"about.bio.2":{en:"I enjoy building useful digital products, not just interfaces. Whether it is a React web app, an iOS prototype, a WordPress website, or a Python data dashboard, my goal is always the same: create something clear, functional, and valuable for the end user.",fr:"J'aime construire des produits numériques utiles, pas seulement des interfaces. Qu'il s'agisse d'une application React, d'un prototype iOS, d'un site WordPress ou d'un tableau de bord Python, mon objectif est toujours le même : créer quelque chose de clair, fonctionnel et précieux pour l'utilisateur final."},"about.bio.3":{en:"I am currently looking for opportunities in web/mobile development, either through freelance missions or a developer position/alternance where I can keep growing while contributing to real projects.",fr:"Je suis actuellement à la recherche d'opportunités en développement web/mobile, que ce soit en freelance ou en poste développeur/alternance où je peux continuer à progresser tout en contribuant à des projets réels."},"about.yearsLearning":{en:"Years Learning",fr:"Ans d'apprentissage"},"about.projectsBuilt":{en:"Projects Built",fr:"Projets réalisés"},"about.pillar.web.title":{en:"Web Development",fr:"Développement Web"},"about.pillar.mobile.title":{en:"Mobile Development",fr:"Développement Mobile"},"about.pillar.data.title":{en:"Data & Backend",fr:"Data & Backend"},"about.pillar.product.title":{en:"Product & UX",fr:"Produit & UX"},"about.pillar.web.desc":{en:"React, Next.js, JavaScript, Tailwind CSS",fr:"React, Next.js, JavaScript, Tailwind CSS"},"about.pillar.mobile.desc":{en:"Swift, SwiftUI, iOS prototyping",fr:"Swift, SwiftUI, prototypage iOS"},"about.pillar.data.desc":{en:"Python, Pandas, Plotly, SQL, SQLite",fr:"Python, Pandas, Plotly, SQL, SQLite"},"about.pillar.product.desc":{en:"Figma, UX research, CMS, product thinking",fr:"Figma, recherche UX, CMS, pensée produit"},"about.viewGithub":{en:"View GitHub",fr:"Voir GitHub"},"skills.label":{en:"02. Skills",fr:"02. Compétences"},"skills.title":{en:"Tech Stack & Expertise",fr:"Stack technique & Expertise"},"skills.all":{en:"All",fr:"Tout"},"skills.stat.tech":{en:"Technologies",fr:"Technologies"},"skills.stat.projects":{en:"Projects Built",fr:"Projets réalisés"},"skills.stat.domains":{en:"Tech Domains",fr:"Domaines tech"},"skills.stat.join":{en:"Looking to Join",fr:"Prêt à rejoindre"},"projects.label":{en:"03. Projects",fr:"03. Projets"},"projects.title":{en:"Things I've Built",fr:"Ce que j'ai construit"},"projects.viewGithub":{en:"View More on GitHub",fr:"Voir plus sur GitHub"},"project.1.subtitle":{en:"iOS Safety App Prototype",fr:"Prototype d'app iOS de sécurité"},"project.1.description":{en:"An iOS prototype designed to help users identify safer and less safe areas, receive alerts, and make better decisions when moving around a city.",fr:"Un prototype iOS conçu pour aider les utilisateurs à identifier les zones sûres et moins sûres, recevoir des alertes et prendre de meilleures décisions lors de leurs déplacements en ville."},"project.1.highlight":{en:"Connecting a real user safety problem with a simple and accessible mobile experience.",fr:"Relier un vrai problème de sécurité utilisateur à une expérience mobile simple et accessible."},"project.2.subtitle":{en:"iOS Recommendation App",fr:"App iOS de recommandation"},"project.2.description":{en:"A SwiftUI app that recommends small outdoor activities based on the user's time, energy, weather, and recent activity history.",fr:"Une app SwiftUI qui recommande des petites activités en plein air selon le temps, l'énergie, la météo et l'historique d'activité de l'utilisateur."},"project.2.highlight":{en:"A recommendation engine that adapts suggestions to the user's context instead of showing generic activities.",fr:"Un moteur de recommandation qui adapte les suggestions au contexte de l'utilisateur au lieu d'afficher des activités génériques."},"project.3.subtitle":{en:"Modern Web Weather Interface",fr:"Interface météo web moderne"},"project.3.description":{en:"A modern weather web app that displays current weather and forecasts using external weather data. The interface adapts visually depending on the weather conditions.",fr:"Une application météo web moderne qui affiche la météo actuelle et les prévisions. L'interface s'adapte visuellement selon les conditions météorologiques."},"project.3.highlight":{en:"Clean, responsive, and practical user experience with real API data from Open-Meteo.",fr:"Expérience utilisateur propre, responsive et pratique avec de vraies données API Open-Meteo."},"project.4.subtitle":{en:"Python & SQL Data Project",fr:"Projet Data Python & SQL"},"project.4.description":{en:"A data analysis project based on a small sales dataset. The goal was to query, analyze, and visualize sales performance by product and region.",fr:"Un projet d'analyse de données basé sur un petit jeu de données de ventes. L'objectif était d'interroger, analyser et visualiser les performances commerciales par produit et par région."},"project.4.highlight":{en:"Transformed raw sales data into clear visual insights including revenue by product and regional performance.",fr:"Transformation de données brutes de ventes en insights visuels clairs incluant le chiffre d'affaires par produit et la performance régionale."},"project.5.subtitle":{en:"WordPress Fitness Website",fr:"Site WordPress fitness"},"project.5.description":{en:"A showcase website for a fitness club, designed to present services, attract users, and encourage visitors to book a free trial session.",fr:"Un site vitrine pour un club de fitness, conçu pour présenter les services, attirer les utilisateurs et encourager les visiteurs à réserver une séance d'essai gratuite."},"project.5.highlight":{en:"Combines sport industry knowledge with web development skills — making it especially aligned with my profile.",fr:"Combine la connaissance du secteur sportif avec les compétences en développement web — ce qui le rend particulièrement aligné avec mon profil."},"project.6.subtitle":{en:"UX & Web Contribution",fr:"Contribution UX & Web"},"project.6.description":{en:"A collaborative project where I contributed to UX thinking, interface structure, and product organization during a volunteer experience with TryioLab.",fr:"Un projet collaboratif où j'ai contribué à la réflexion UX, la structure d'interface et l'organisation produit lors d'une expérience bénévole avec TryioLab."},"project.6.highlight":{en:"Worked in a team environment and connected design decisions directly with user needs.",fr:"Travail en équipe et connexion directe des décisions de design avec les besoins utilisateurs."},"experience.label":{en:"04. Experience",fr:"04. Expérience"},"experience.title":{en:"Where I'v
